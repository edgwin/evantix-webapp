<form (ngSubmit)="onSubmit()" #eventoForm="ngForm">
  <h2>Datos del Evento</h2>
<table style="width: 100%;">
  <tr>
    <td>
      <mat-form-field appearance="fill">
        <mat-label>Nombre del Evento</mat-label>
        <input matInput name="nombre" [(ngModel)]="evento.nombre" required>
      </mat-form-field>
    </td>
  </tr>
  <tr>
    <td>
      <mat-form-field appearance="fill">
        <mat-label>Fecha y Hora</mat-label>
        <input matInput [matDatepicker]="picker" [(ngModel)]="evento.fecha" name="fecha" required>
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker touchUi="true"></mat-datepicker>
      </mat-form-field>
    </td>
  </tr>
  <tr>
    <td>
      <mat-form-field appearance="fill">
        <mat-label>Lugar del Evento</mat-label>
        <input matInput name="lugar" [(ngModel)]="evento.lugar" required>
      </mat-form-field>
    </td>
  </tr>
  <tr>
  <td colspan="2">
    <div style="display: flex; gap: 16px;">
      <mat-form-field appearance="fill" style="flex: 1; width: 20%;">
        <mat-label>País</mat-label>
        <mat-select [(ngModel)]="evento.codigoPais" name="codigoPais" required>
          <mat-option *ngFor="let pais of codigosPais" [value]="pais.dialCode">
            {{ pais.name }} ({{ pais.dialCode }})
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="fill" style="flex: 2; width: 80%;">
        <mat-label>Número de WhatsApp</mat-label>
        <input
          matInput
          name="numero"
          [(ngModel)]="evento.whatsapp"
          required
          type="tel"
          pattern="[0-9]*"
          maxlength="15" />
      </mat-form-field>
    </div>
  </td>
</tr>
  <tr>
    <td>
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput type="email" name="email" [(ngModel)]="evento.email" required>
      </mat-form-field>
    </td>
  </tr>
  <tr>
    <td>
      <label>Imagen alusiva al evento</label>
      <input type="file" name="imagen" (change)="onFileChange($event)" /> 
    </td>
  </tr>
</table>  
  <swiper-container
    slides-per-view="1"
    navigation="true"
    pagination="true"
    loop="true"
    #swiperRef>
    
    <swiper-slide *ngFor="let plan of planes; let i = index" [attr.data-plan]="plan.nombre" (click)="seleccionarPlan(plan)">
      <div class="plan-card" [class.selected]="evento.plan === plan.nombre">
        <img [src]="plan.imagen" [alt]="plan.nombre" />
        <h3>{{ plan.nombre | titlecase }}</h3>
      </div>
    </swiper-slide>
  </swiper-container>

  <p *ngIf="evento.plan">Plan seleccionado: <strong>{{ evento.plan | titlecase }}</strong></p>

  <div class="button-group">
    <button class="btn btn-primary" type="submit" style="padding-left: 50px;padding-right: 50px;">Guardar</button>
    <button class="btn btn-primary" type="button" style="padding-left: 50px;padding-right: 50px;" (click)="cancelar()">Cancelar</button>
  </div>
</form>
