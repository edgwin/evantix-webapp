<nav class="topbar">
  <div class="topbar-inner">

    <!-- Left: Hamburger (mobile) -->
    <div class="topbar-left">
      @if (showMenuButton) {
        <button class="hamburger-btn" (click)="onToggleSidenav()" aria-label="Abrir menú">
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
        </button>
      }
      <a class="topbar-brand" routerLink="/dashboard">
        <span class="brand-icon">&#10022;</span>
        <span class="brand-name">Evantix</span>
      </a>
    </div>

    <!-- Right: user info + logout -->
    <div class="topbar-right">
      <div class="user-avatar" [innerHTML]="svgImage"></div>
      <span class="user-name">{{ loggedUser?.firstName }}</span>
      <button class="logout-btn" (click)="onLogoff()" title="Cerrar sesión">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="logout-label">Salir</span>
      </button>
    </div>

  </div>
</nav>
