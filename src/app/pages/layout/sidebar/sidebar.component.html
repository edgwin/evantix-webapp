<div class="sideBar">
  <div style="text-align: center;">
    <img src="../../../../assets/images/Evantix.png" alt="Logo" height="128px" width="128px"/>  
  </div>
  <mat-nav-list>    
    <mat-list-item (click)="toggleInvitacionesSubmenu()">
      <span>Invitaciones</span>
      <mat-icon class="expand-icon">{{ submenuInvitacionesOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
    </mat-list-item>
    <div *ngIf="submenuInvitacionesOpen" class="submenu">
      <a mat-list-item routerLink="/profile"><span>Mis Eventos</span></a>
      <a mat-list-item routerLink="/account"><span>Mis Invitaciones</span></a>
      <a mat-list-item routerLink="/account"><span>Mis Invitados</span></a>
      <a mat-list-item routerLink="/account"><span>Acomodo de Mesas</span></a>
    </div>
    <mat-list-item (click)="toggleConfirmacionesSubmenu()">
      <span>Confirmaciones</span>
      <mat-icon class="expand-icon">{{ submenuConfirmacionesOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
    </mat-list-item>
    <div *ngIf="submenuConfirmacionesOpen" class="submenu">
      <a mat-list-item routerLink="/profile"><span>Campañas</span></a>
      <a mat-list-item routerLink="/account"><span>Lista de Confirmaciones</span></a>      
    </div>
    <a mat-list-item routerLink="/settings"><span>Configuraciones</span></a>
  </mat-nav-list>  
</div>
