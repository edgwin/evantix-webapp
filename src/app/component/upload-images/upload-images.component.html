<div class="upload-container"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)">
  <p>Arrastra y suelta imágenes aquí</p>
  <p>O</p>
  <input type="file" multiple accept="image/*" (change)="onFileInputChange($event)" />
</div>

@if (previews.length > 0) {
  <div class="preview-container">
    <h3>Imágenes seleccionadas:</h3>
    <div class="preview-grid">
      @for (src of previews; track src) {
        <img [src]="src" />
      }
    </div>
    <button mat-raised-button color="primary" (click)="upload()">Subir</button>
    <button mat-button color="warn" (click)="clearAll()">Limpiar</button>
  </div>
}
