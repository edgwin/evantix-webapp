<div class="plan-card">
  <div class="plan-header" [ngStyle]="{ 'background-color': headerColor }">
    <h3>{{ planTitle }}</h3>
    <p *ngIf="planSubtitle" class="plan-subtitle">{{ planSubtitle }}</p>
  </div>
  <div class="plan-price">
    <div class="price-circle">
      ${{ price }}
    </div>
  </div>
  <ul class="plan-features">
    <li *ngFor="let feature of features">
      {{ feature }}
    </li>
  </ul>
</div>
