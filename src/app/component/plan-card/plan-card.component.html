<div class="plan-card">
  <div class="plan-header" [ngStyle]="{ 'background-color': headerColor }">
    <h3>{{ planTitle }}</h3>
    @if (planSubtitle) {
      <p class="plan-subtitle">{{ planSubtitle }}</p>
    }
  </div>
  <div class="plan-price">
    <div class="price-circle">
      ${{ price }}
    </div>
  </div>
  <ul class="plan-features">
    @for (feature of features; track feature) {
      <li>
        {{ feature }}
      </li>
    }
  </ul>
</div>
