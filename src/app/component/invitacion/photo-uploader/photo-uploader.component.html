<div class="container">
  <div class="row">
    <div class="text-center editableTitulo"
      id="Titulo"
      >
      ¡Sube tus fotos del Evento!
    </div>
  </div>
</div>

<div class="uploader">

  <input
    #fileInput
    type="file"
    multiple
    accept=".jpg,.jpeg,.png,.heic,.heif"
    hidden
    (change)="onFilesSelected($event)"
    />

    <div
      class="drop-zone"
      [class.dragging]="isDragging"
      (click)="openFileDialog()"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave()"
      >
      @if (!isUploading) {
        <p>Haz click o arrastra imágenes aquí</p>
      }
      @if (isUploading) {
        <p>Subiendo imágenes...</p>
      }
    </div>

    @if (previews.length) {
      <div class="preview-grid">
        @for (img of previews; track img) {
          <img [src]="img" />
        }
      </div>
    }

  </div>
