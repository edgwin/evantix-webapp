<div *ngIf="!loading">
    <div class="container">
        <div class="row">
            <div class="text-center editableFestejadosTitulo" contenteditable="true" id="TituloFestejados"
                (blur)="onTituloBlur($event)"                
                (click)="onClickTitulo()"
                (keydown)="onKeyDown($event)">
                {{data.titulo}}
            </div>
        </div>				
    </div>    
    <div>
        <div class="image-container">
            <!-- Imagen principal -->
            <img [src]="data.imagen" 
                alt="" 
                class="img-frase" 
                *ngIf="!loading" 
                @fadeInScale>

            <!-- Botón de editar (arriba a la derecha) -->
            <img src="../../../../assets/editarImagen.png" 
                alt="editar imagen" 
                class="edit-image-btn"
                (click)="triggerImageUpload()" 
                title="Click para editar imagen" 
                *ngIf="!loadingImg">
            <div class="loaderFestejados" *ngIf="loadingImg"></div>                
        </div>        

        <!-- Texto editable -->
        <div>
            <div class="frase-txt" contenteditable="true" id="FraseFestejados"
            (blur)="onFraseBlur($event)"
            (click)="onClickTitulo()"
            (keydown)="onKeyDown($event)">
            {{data.frase}}
        </div>
        </div>
    </div>

</div>
