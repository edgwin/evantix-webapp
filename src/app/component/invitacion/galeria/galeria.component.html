<section class="galeria-section">
  <div class="section-content">
    <div class="section-header" *ngIf="!loading">
      <span class="header-decoration-line"></span>
      <h1>Galeria de Fotos</h1>
      <span class="header-decoration-line"></span>
    </div>

    <div class="gallery-wrapper"
         *ngIf="showGallery"
         (pointerdown)="onPointerDown($event)"
         (pointermove)="onPointerMove($event)"
         (pointerup)="onPointerUp($event)"
         (pointercancel)="onPointerUp($event)"
         (mouseleave)="resumeAutoplayWithDelay()">

      <div class="gallery" [ngClass]="animationDirection">
        <div class="side left">
          <img [src]="prevImg()" alt="prev" class="side-img"
               (contextmenu)="$event.preventDefault()"
               appDisableDownload>
        </div>

        <div class="center">
          <div class="center-image-wrapper">
            <img [src]="currentImg()" alt="current" class="center-img"
                 (click)="openFullScreen()"
                 (contextmenu)="$event.preventDefault()"
                 appDisableDownload>
            <button class="delete-btn" (click)="triggerImageDelete()" *ngIf="!isReadOnly" title="Eliminar foto">
              <img src="assets/BtnDelete.png" alt="eliminar">
            </button>
          </div>
        </div>

        <div class="side right">
          <img [src]="nextImg()" alt="next" class="side-img"
               (contextmenu)="$event.preventDefault()"
               appDisableDownload>
        </div>
      </div>

      <div class="nav-container">
        <button class="nav-btn" (click)="prev()">
          <img src="../../../../assets/left.png" />
        </button>
        <button class="nav-btn" (click)="next()">
          <img src="../../../../assets/right.png" />
        </button>
      </div>

      <div class="dots" *ngIf="data?.length > 1">
        <button class="dot"
                *ngFor="let _ of data; let i = index"
                [class.active]="i === currentIndexValue"
                (click)="goTo(i)">
        </button>
      </div>
    </div>

    <div class="add-item-container" *ngIf="!isReadOnly">
      <div class="loader-galeria" *ngIf="loading"></div>
      <div *ngIf="!loading">
        <input #fileInput type="file" accept="image/*" multiple hidden (change)="triggerImageUpload($event)">
        <button class="add-item-btn" (click)="fileInput.click()">
          <span class="add-icon">+</span>
          <span>Agregar fotos</span>
        </button>
      </div>
    </div>
  </div>
</section>

<div class="fullscreen-overlay" *ngIf="selectedImage" (click)="closeFullScreen()">
  <img [src]="selectedImage" class="fullscreen-image" (click)="$event.stopPropagation()" appDisableDownload>
  <button class="close-button" (click)="closeFullScreen()">✕</button>
</div>
