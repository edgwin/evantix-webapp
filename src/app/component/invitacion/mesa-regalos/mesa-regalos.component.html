<section class="imagen-fondo" [style.background-image]="'
    linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
    url(' + data.imagen + ')'
">
<div class="editImage" *ngIf="!isReadOnly"> 
  <img src="../../../../assets/editarImagen.png"
       class="edit-imageIndicaciones-btn"
       alt=""
       title="Click para editar imagen de fondo"
       (click)="triggerImageUpload()"
       *ngIf="!loadingImg"
       >
  <div class="loaderPortada" *ngIf="loadingImg"></div>
</div>
<div class="heading">
    <h1 style="color:white">Mesa de Regalos</h1>
</div>
  <div class="grid-container">
    <div class="card" *ngFor="let item of data.details let i = index">
         <img src="../../../../assets/BtnDelete.png" alt="" height="64px" width="64px" class="editIndicacionesDelete"
                                title="Click para eliminar elemento" (click)="triggerElementDelete(item.id)" *ngIf="!isReadOnly">
        <!-- Ícono encima -->
        <div class="cardIcon">
          <img [src]="item.imagen" />          
        </div>
        <div *ngIf="!isReadOnly">
            <img src="../../../../assets/editarImagen.png"
            class="edit-icon-image-btn"
            alt="Editar imagen"
            title="Click para editar imagen"
            (click)="openPopup(i)" 
            >
        </div>
        <!-- Contenido -->        
        <div class="titulo" [attr.contenteditable]="!isReadOnly"
          [attr.data-id-titulo]="item.id"
          (keydown)="onKeyDown($event,22)" 
          (blur)="saveContent($event, item.id, 'titulo')"
          (click)="!isReadOnly && onClickTitulo(item.id)"
        >
            {{item.titulo}}
        </div>
        <div id="descripcion" [attr.contenteditable]="!isReadOnly"
          [attr.data-id-descripcion]="item.id"
          (keydown)="onKeyDown($event,200)" 
          (blur)="saveContent($event, item.id, 'descripcion')"
          (click)="!isReadOnly && onClickDescripcion(item.id)"
          appAiEditable
          [aiSection]="'Mesa de Regalos'"
          [aiEventType]="eventType"
          [maxLength]="200"
          [aiReadOnly]="isReadOnly"
          >
            {{item.descripcion}}
        </div>        
        <div class="url-section">
          <div *ngIf="!isReadOnly">
            <input type="text" title="Escriba o pegue la URL de su mesa de regalos, si no escribe una URL no aparecera el boton de 'Ir a Mesa', Esta caja de texto no aparecera en la version final de su invitacion"
                    placeholder="Escribe aquí la URL de tu mesa de regalos"
                    [(ngModel)]="item.url"
                    (blur)="saveContent($event, item.id, 'url')"
                    class="mesa-form-control"/>
            </div>
            <div>
            <a *ngIf="item.url"
                [href]="item.url"
                target="_blank"
                class="inside-row-btn-mesa btn btn-primary">
                Ir a la Mesa
            </a>
            </div>
        </div>
    </div>    
  </div>
  <div style="text-align: center" class="newBtn" *ngIf="!isReadOnly">
    <img src="../../../../assets/BtnAddNew.png" style="cursor: pointer;" alt="" height="64px" width="64px"
          title="Click para agregar elemento" (click)="nuevaMesa()" *ngIf="!loading && (data?.details?.length || 0) < 3">
  </div>
</section>

<app-popup-html 
  [visible]="showPopup" 
  [images]="images"
  title="Selecciona una imagen"
  (closed)="onClosePopup()"
  (imageSelected)="onImageSelected($event)">
</app-popup-html>
