<section class="personas-favoritas-section">
  <div class="section-content">
    <div class="section-header">
      <span class="header-decoration-line"></span>
      <h1 [attr.contenteditable]="!isReadOnly"
          id="TituloPF"
          (click)="!isReadOnly && onClickTituloPF()"
          (keydown)="onKeyDown($event, 50)"
          (blur)="onTituloBlur($event)"
          appAiEditable
          [aiSection]="'Persona Favoritas como Padres y Padrinos'"
          [aiEventType]="eventType"
          [maxLength]="50"
          [aiReadOnly]="isReadOnly">
        {{ data.titulo }}
      </h1>
      <span class="header-decoration-line"></span>
    </div>
    
    <p class="section-description"
       [attr.contenteditable]="!isReadOnly"
       (click)="!isReadOnly && onClickFrasePF()"
       (keydown)="onKeyDown($event, 120)"
       (blur)="onFraseBlur($event)"
       id="FrasePF"
       appAiEditable
       [aiSection]="'Persona Favoritas como Padres y Padrinos, frase emotiva o agradecimiento'"
       [aiEventType]="eventType"
       [maxLength]="120"
       [aiReadOnly]="isReadOnly">
      {{ data.frase }}
    </p>

    <div class="gallery-wrapper"
         *ngIf="showGallery"
         (pointerdown)="onPointerDown($event)"
         (pointermove)="onPointerMove($event)"
         (pointerup)="onPointerUp($event)"
         (pointercancel)="onPointerUp($event)"
         (mouseleave)="resumeAutoplayWithDelay()">
      
      <div class="gallery" [ngClass]="animationDirection">
        <div class="side left">
          <img [src]="prevImg()" alt="prev" class="side-img" appDisableDownload>
        </div>

        <div class="center">
          <div class="center-image-wrapper">
            <img [src]="currentImg()" alt="current" class="center-img" appDisableDownload>
            <button class="edit-btn" (click)="onOpenPopup()" *ngIf="!isReadOnly" title="Editar">
              <img src="assets/editData.png" alt="editar">
            </button>
          </div>
        </div>

        <div class="side right">
          <img [src]="nextImg()" alt="next" class="side-img" appDisableDownload>
        </div>
      </div>

      <div class="person-info" *ngIf="currentParentesco() || currentNombres()">
        <span class="person-role" *ngIf="currentParentesco()">{{ currentParentesco() }}</span>
        <span class="person-name" *ngIf="currentNombres()">{{ currentNombres() }}</span>
      </div>

      <div class="nav-container">
        <button class="nav-btn" (click)="prev()">
          <img src="../../../../assets/left.png" />
        </button>
        <button class="nav-btn" (click)="next()">
          <img src="../../../../assets/right.png" />
        </button>
      </div>

      <div class="dots" *ngIf="data?.details?.length > 1">
        <button class="dot"
                *ngFor="let _ of data?.details; let i = index"
                [class.active]="i === currentIndexValue"
                (click)="goTo(i)">
        </button>
      </div>
    </div>

    <div class="add-item-container" *ngIf="!isReadOnly && !loading">
      <button class="add-item-btn" (click)="addNewPersonaFavorita()">
        <span class="add-icon">+</span>
        <span>Agregar persona</span>
      </button>
    </div>
  </div>
</section>

<ng-container *ngIf="showPopup">
  <app-popup-html 
    [visible]="showPopup" 
    title="Modifica la informacion"
    [personasFavoritasEdit]="true"
    [imagenPF]="currentImagen4Popup"
    [parentescoPF]="currentParentesco4Popup"
    [nombresPF]="currentNombre4Popup"
    [personaFavoritaId]="currentId4Popup"
    (closed)="onClosePopup()">
  </app-popup-html>
</ng-container>
