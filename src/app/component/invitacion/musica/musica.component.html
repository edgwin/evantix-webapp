<!-- Modo edición: widget completo -->
<div *ngIf="!isLoading && !isReadOnly">
    <div class="text-center editableTitulo">
    Elije tu cancion de Fondo
    </div>

    <div class="music-widget">
    <!-- TAGS -->
    <div class="tags-container">
        <button
        class="tag"
        *ngFor="let tag of availableTags"
        [class.active]="selectedTags.includes(tag)"
        (click)="toggleTag(tag)">
        {{ tag.label }}
        </button>
    </div>

    <!-- TRACK SELECT -->
    <div class="track-selector" *ngIf="tracks.length">
        <select [(ngModel)]="selectedTrackId" (change)="onTrackChange()">
            <option value="">Selecciona una canción</option>
            <option *ngFor="let t of tracks" [value]="t.id">
                {{ t.name }} – {{ t.artist_Name }}
            </option>
        </select>
    </div>

    <!-- CONTROLES -->
    <div class="controls" *ngIf="selectedTrack">
        <button (click)="togglePlayPause()">
        {{ isPlaying ? '⏸ Pausar' : '▶ Reproducir' }}
        </button>

        <button *ngIf="!saved" class="save" (click)="saveTrack()">
        💾 Guardar
        </button>
        <button *ngIf="saved" class="save" (click)="deleteTrack()">
        🧹 Quitar
        </button>
    </div>

    </div>
</div>

<!-- Modo ReadOnly: reproductor minimalista -->
<div *ngIf="isReadOnly && selectedTrack" class="music-player-readonly">
    <div class="music-player-info">
        <span class="music-icon">🎵</span>
        <span class="track-info">{{ selectedTrack.name }} - {{ selectedTrack.artist_Name }}</span>
    </div>
    <button class="play-pause-btn" (click)="togglePlayPause()">
        {{ isPlaying ? '⏸' : '▶' }}
    </button>
</div>
