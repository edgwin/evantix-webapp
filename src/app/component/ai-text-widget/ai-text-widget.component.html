<!-- Overlay - solo visible cuando está expandido -->
@if (isExpanded) {
  <div class="ai-widget-overlay" (click)="closeWidget()"></div>
}

<div class="ai-widget-container"
  [class.collapsed]="!isExpanded"
  [style.top.px]="position.top"
  [style.left.px]="position.left">

  <!-- Header - siempre visible -->
  <div class="ai-widget-header" (click)="toggleExpand()">
    <h3>
      <span class="icon">✨</span>
      Mejorar Texto con IA
      <span class="expand-indicator" [class.expanded]="isExpanded">▼</span>
    </h3>
    <button class="close-btn" (click)="closeWidget(); $event.stopPropagation()" type="button">×</button>
  </div>

  <!-- Body - solo visible cuando está expandido -->
  @if (isExpanded) {
    <div class="ai-widget-body">
      <!-- Selector de tono -->
      <div class="form-group">
        <label>Tono:</label>
        <select [(ngModel)]="tone" class="form-control">
          @for (t of tones; track t) {
            <option [value]="t.value">{{ t.label }}</option>
          }
        </select>
      </div>
      <!-- Versión corta -->
      <!-- <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" [(ngModel)]="shortVersion">
        Versión corta para móvil
      </label>
    </div> -->
    <!-- Longitud máxima (solo si es versión corta) -->
    @if (shortVersion) {
      <div class="form-group">
        <label>Longitud máxima (caracteres):</label>
        <input type="number" [(ngModel)]="maxLength" class="form-control" min="50" max="500">
      </div>
    }
    <!-- Mensaje de error -->
    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }
    <!-- Botón de generar -->
    <button
      class="generate-btn"
      (click)="generateText(); $event.stopPropagation()"
      [disabled]="isLoading"
      type="button">
      @if (!isLoading) {
        <span>🪄 Generar Texto con IA</span>
      }
      @if (isLoading) {
        <span>
          <span class="spinner"></span> Generando...
        </span>
      }
    </button>
  </div>
}
</div>
