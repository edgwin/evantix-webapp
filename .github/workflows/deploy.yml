name: Deploy Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npx ng build --configuration production

      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

          SCP="scp -i ~/.ssh/id_deploy"
          SSH="ssh -i ~/.ssh/id_deploy ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          $SCP -r ./dist/angular17_login_signup_localstorage/browser/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/evantix/
          $SSH "sudo chown -R www-data:www-data /var/www/evantix"
          echo "Frontend deployed ✅"
